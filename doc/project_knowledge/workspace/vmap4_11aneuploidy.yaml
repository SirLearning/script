kind: workspace_module
id: vmap4_11aneuploidy
title: Mosdepth aneuploidy scan (benchmark)
version: "1.0"
path: /data/home/tusr1/01projects/vmap4/11aneuploidy
status: active
purpose: >
  Parallel mosdepth *.summary.txt aneuploidy scan via
  workflow/Genetics/subworkflows/tmp/mosdepth_aneuploidy_scan.nf.
  Input depth summaries live under 00data/04depth/{cohort}/ (read-only).
  Nextflow session dirs live here — not under 00data/.

publish:
  job: benchmark
  mod: aneuploidy_check
  root: /data1/dazheng_tusr1/vmap4.VCF.v1/benchmark/stats/aneuploidy_check
  layout:
    info: "{sample_aneuploidy_summary,flagged_samples}.tsv"
    chr_depth: "info/chr_depth/{chr1A,...}.depth.tsv"
    plots: "plots/{chr}.rel_depth.dist[.logy].png, {chr}.rel_depth.vs_baseline.png, {chr}.rel_depth.vs_fmiss.png, {chr}.flagged_group.count.png, {chr}.flagged_rate_by_group.png, flagged_sample_group.rel_depth.chr_distribution.line.png, flagged_sample_group.rel_depth.chr_distribution.sub{A,B,D}.line.png"
    logs: "logs/"

replot_nf: workflow/Genetics/subworkflows/tmp/mosdepth_aneuploidy_replot.nf

runs:
  - folder: 01run_benchmark_full
    role: Full cohort scan (~8287 samples, 9 depth folders)
    cwd: /data/home/tusr1/01projects/vmap4/11aneuploidy/01run_benchmark_full
    note: >
      Mis-placed duplicate session under 00data/05aneuploidy/ is historical;
      do not reuse for new attempts.

input_depth_root: /data/home/tusr1/01projects/vmap4/00data/04depth
