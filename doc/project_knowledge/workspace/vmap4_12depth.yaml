kind: workspace_module
id: vmap4_12depth
title: Single-sample mosdepth depth runs
version: "1.0"
path: /data/home/tusr1/01projects/vmap4/12depth
status: active
purpose: >
  Ad-hoc ct_depth_with_mosdepth reruns for individual BAMs via
  workflow/Genetics/subworkflows/tmp/mosdepth_single_bam.nf.
  Publishes mosdepth artefacts to 00data/04depth/{cohort}/.

entry_nf: workflow/Genetics/subworkflows/tmp/mosdepth_single_bam.nf
config: workflow/Genetics/conf/mosdepth_single_bam.config

runs:
  - folder: 01run_D_0132_mosdepth
    role: Regenerate mosdepth for D_0132 (10 threads)
    cwd: /data/home/tusr1/01projects/vmap4/12depth/01run_D_0132_mosdepth
    input_bam: /data/home/tusr1/01projects/vmap4/00data/02bam/bam1/D/D_0132.bam
    publish_dir: /data/home/tusr1/01projects/vmap4/00data/04depth/04D
    outcome: succeeded (~3m46s); summary mean 9.44x
  - folder: 02run_ABD_0915_0938_mosdepth
    role: Regenerate mosdepth for ABD_0915 and ABD_0938 (10 threads each)
    cwd: /data/home/tusr1/01projects/vmap4/12depth/02run_ABD_0915_0938_mosdepth
    publish_dir: /data/home/tusr1/01projects/vmap4/00data/04depth/03ABD
    outcome: succeeded (~8m43s); summary mean 6.41x (0915), 6.23x (0938)

artefacts:
  - path: /data/home/tusr1/01projects/vmap4/00data/04depth/04D/D_0132.bam.mosdepth.summary.txt
    role: mosdepth summary (replaces empty prior file)
  - path: /data/home/tusr1/01projects/vmap4/00data/04depth/03ABD/ABD_{0915,0938}.bam.mosdepth.summary.txt
    role: full mosdepth summaries (47 lines incl. total; replaces incomplete 28-line files)
  - path: /data/home/tusr1/01projects/vmap4/00data/05taxaBamMap/final.{A,B,D,ALL}.taxaBamMap.txt
    role: all.* base + D_0132 (D/ALL) + ABD_0915/ABD_0938 (A/B/D/ALL)
