kind: workspace_module
id: vmap4_10stats_genome
title: PopDep and main_raw_popdepth runs
version: "1.0"
path: /data/home/tusr1/01projects/vmap4/10stats.genome
purpose: >
  Current stats module for TIGER PopDepFull / PopDepCrossChr partial tasks
  (--partial_task main_raw_popdepth). Numbered runs from 01; 08stats.genome kept
  for historical assess/LD/wheat work.
partial_task: main_raw_popdepth
default_job: test_plink
publish_base: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/process/main_raw/variant/

runs:
  - folder: 01run_main_raw_popdepth
    summary: chr36 PopDep smoke then full 44-chr sweep (legacy per-chr PopDep)
    nf_cmd_ref: "doc/progress/ — 2026-06-15 main_raw_popdepth chr36 smoke"
    screen: [popdep_chr36, popdep_all]

  - folder: 02run_popdepfull_chr36_benchmark
    summary: PopDepFull chr36 benchmark (TIGER_PD_20260615.jar)
    nf_cmd_ref: "doc/progress/ — 2026-06-15 PopDepFull chr36 benchmark"
    screen: popdepfull_chr36

  - folder: 03run_popdepfull_fork2_bench
    summary: PopDepFull fork-2 throughput benchmark (inferred from name)
    status: undocumented_in_nf_cmd

  - folder: 04run_popdepfull_fork4_bench
    summary: PopDepFull fork-4 throughput benchmark (inferred from name)
    status: undocumented_in_nf_cmd

  - folder: 05run_main_raw_popdepth_full
    summary: Production PopDepFull full sweep planning run
    nf_cmd_ref: "doc/progress/ — 2026-06-15 follow-up PopDepFull params"

  - folder: 06run_main_raw_popdepth_full
    summary: PopDepFull full 44-chr BGZF publish (replaced by 07run CrossChr)
    nf_cmd_ref: "doc/progress/ — 2026-06-16 PopDepFull full sweep"
    screen: popdepfull_all

  - folder: 07run_main_raw_popdepth_crosschr
    summary: PopDepCrossChr production attempt (TIGER_PD_20260616.jar)
    nf_cmd_ref: "doc/progress/ — 2026-06-16 PopDepCrossChr 07run"
    screen: popdep_crosschr

  - folder: 08run_main_raw_popdepth_crosschr
    summary: PopDepCrossChr v2 (length file Chr/Length/nTaxa fix)
    nf_cmd_ref: "doc/progress/ — 2026-06-16 PopDepCrossChr v2 08run"
    screen: popdep_crosschr_v2

  - folder: 09run_popdep_crosschr_threads_bench
    summary: CrossChr thread sweep 8–128 @ 384G
    nf_cmd_ref: "doc/progress/ — 2026-06-16 thread benchmark"
    screen: popdep_bench9

  - folder: 10run_popdep_head2head
    summary: PopDepFull vs PopDepCrossChr head-to-head (N3/N20, truncated BAM extract)
    nf_cmd_ref: "doc/progress/ — 2026-06-17 head2head"
    artefacts: bench_assets/tb.N3_micro.txt, tb.N20.txt

  - folder: 11run_popdep_head2head_bgz_split
    summary: Truncated head2head after bgzip/tabix split from TIGER compute
    nf_cmd_ref: "doc/progress/ — 2026-06-17 11run bgz split"
    screen: [popdep_h2h_11run, popdep_h2h_t2mon]

  - folder: 12run_popdep_crosschr_smoke
    summary: CrossChr smoke / flatMap fix validation (inferred)
    status: undocumented_in_nf_cmd

  - folder: 12run_popdep_extract_n200
    summary: N200 truncated BAM extract (10 Mb × 44 chr)
    nf_cmd_ref: "doc/progress/ — 2026-06-18 N200 extract"
    screen: popdep_extract_n200
    note: Duplicate NN prefix 12 with crosschr_smoke folder.

  - folder: 13run_popdep_n200_bench
    summary: N200 bench harness + popdep_tiger_threads smoke
    nf_cmd_ref: "doc/progress/ — 2026-06-18 N200 bench harness"

  - folder: 14run_popdep_n200_bench
    summary: N200 full bench + checkpoint preflight (TIGER_PD_20260619.jar)
    nf_cmd_ref: "doc/progress/ — 2026-06-19 N200 14run"
    screen: popdep_n200_14run

  - folder: 15run_main_raw_popdepth_crosschr
    summary: Full main_raw PopDepCrossChr production (~8285 taxa, 96 threads, shuffle, ci=500)
    nf_cmd_ref: "doc/progress/ — 2026-06-19 PopDepCrossChr 15run production"
    screen: popdep_crosschr_15run
    publish: main_raw/variant/chrNNN.popdep.txt.bgz

  - folder: 16run_popdep_bench_plots
    summary: Bench result plotting / summary (inferred from name)
    status: undocumented_in_nf_cmd

  - folder: 30run_popdep_n1000_gam_credible
    summary: PopDepCrossChr N1000 GAM credible-deep taxa; publish _popdep_n1000_gam_credible/variant (44 chr; popdep_chr_exclude 32)
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/process/_popdep_n1000_gam_credible/variant/

  - folder: 31run_popdep_n500_gam_credible
    summary: PopDepCrossChr N500 GAM credible-deep taxa; completed 2026-06-27; 44 chr popdep (exclude 32)
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/process/_popdep_n500_gam_credible/variant/
    screen: popdep_n500_gam

  - folder: 32run_popdep_n500_chr32_popdepfull
    summary: PopDepFull chr32 only — N500 GAM credible panel; merges into _popdep_n500_gam_credible/variant
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/process/_popdep_n500_gam_credible/variant/chr032.popdep.txt.bgz
    screen: popdep_n500_chr32
    taxa_map: /data/home/tusr1/01projects/vmap4/00data/05taxaBamMap/popdep/tb.N500_gam_credible_deep.taxaBamMap.txt
    params:
      popdep_tiger_app: PopDepFull
      popdep_chr_list: "32"
      popdep_tiger_threads: 32
      popdep_tiger_memory_gb: 640

  - folder: 33run_popdep_n500_annotate_thin
    summary: N500 popdep tabix annotate → test_thin *.popdep.info.tsv
    nf_cmd_ref: "doc/progress/ — 2026-06-28 N500 popdep annotate+stats"
    screen: popdep_n500_ann_thin
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_annotate.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/process/test_thin/variant/*.popdep.info.tsv

  - folder: 34run_popdep_n500_stats_thin
    summary: popdep_missing_reg + Mahalanobis on test_thin N500 annotations
    nf_cmd_ref: "doc/progress/ — 2026-06-28 N500 popdep annotate+stats"
    screen: popdep_n500_stats_thin
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_stats.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/stats/test_thin/

  - folder: 35run_popdep_n500_annotate_common_thin
    summary: N500 popdep tabix annotate → test_common_thin *.popdep.info.tsv
    nf_cmd_ref: "doc/progress/ — 2026-06-28 N500 popdep annotate+stats"
    screen: popdep_n500_ann_common
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_annotate.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/process/test_common_thin/variant/*.popdep.info.tsv

  - folder: 36run_popdep_n500_stats_common_thin
    summary: popdep_missing_reg + Mahalanobis on test_common_thin N500 annotations
    nf_cmd_ref: "doc/progress/ — 2026-06-28 N500 popdep annotate+stats"
    screen: popdep_n500_stats_common
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_stats.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/stats/test_common_thin/

  - folder: 44run_popdep_qc_trim_replot
    summary: popdep_stats replot with adaptive upper-axis trim (.trim.png)
    nf_cmd_ref: "doc/progress/2026-07-06.md — NF replay: popdep adaptive trim replot"
    screen: popdep_trim_replot
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_stats.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/stats/{test_thin,test_common_thin}/plots/*.trim.png

  - folder: 45run_popdep_qc_axis0_replot
    summary: popdep_stats replot with mean/SD/variance axis floor at 0
    nf_cmd_ref: "doc/progress/2026-07-07.md — NF replay: popdep axis0 replot"
    screen: popdep_axis0
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_stats.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/stats/{test_thin,test_common_thin}/plots/

  - folder: 46run_popdep_qc_trim999_replot
    summary: popdep_stats replot with max-only 99.9th-percentile trim999 scatter PNGs
    nf_cmd_ref: "doc/progress/2026-07-07.md — NF replay: popdep trim999 replot"
    screen: popdep_trim999
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_stats.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/stats/{test_thin,test_common_thin}/plots/*.trim999.png

  - folder: 47run_popdep_qc_trim99_replot
    summary: popdep_stats replot — trim99 max-only 99th percentile (same spec as trim999)
    nf_cmd_ref: "doc/progress/2026-07-07.md — NF replay: popdep trim99 replot"
    screen: popdep_trim99
    entry_nf: workflow/Genetics/subworkflows/tmp/popdep_stats.nf
    publish: /data1/dazheng_tusr1/vmap4.VCF.v1/test_plink/stats/{test_thin,test_common_thin}/plots/*.trim99.png

  - folder: 48run_test_common_inter
    summary: test_common_inter full pipeline — conservative rare-inter extract (maxForks=3, group_workers=2)
    nf_cmd_ref: "doc/progress/2026-07-09.md — NF replay: test_common_inter conservative rerun"
    screen: tcommon_inter
    entry_nf: workflow/Genetics/main.nf
    mod: test_common_inter

  - folder: 48run_test_common_inter
    summary: test_common_inter full pipeline — conservative rare-inter extract (maxForks=3, group_workers=2)
    nf_cmd_ref: "doc/progress/2026-07-09.md — NF replay: test_common_inter conservative rerun"
    screen: tcommon_inter
    entry_nf: workflow/Genetics/main.nf
    mod: test_common_inter
